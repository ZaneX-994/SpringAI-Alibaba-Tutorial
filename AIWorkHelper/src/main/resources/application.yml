

# 服务器配置
server:
  port: 8888
  servlet:
    context-path: /

spring:
  application:
    name: aiworkhelper

  # MongoDB 数据库配置
  data:
    mongodb:
      host: 127.0.0.1
      port: 27017
      database: aiworkhelper

# JWT Token 配置
jwt:
  # 密钥至少需要 256 bits (32 字节)，这里使用 64 字符的密钥确保足够安全
  secret: bytewizard.aiworkhelper.jwt.secret.key.2024.secure.minimum.256bits
  # Token 过期时间（秒），8640000秒 = 100天
  expire: 8640000