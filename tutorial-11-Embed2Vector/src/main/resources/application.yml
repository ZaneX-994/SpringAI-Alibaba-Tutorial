server:
  port: 8011

  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8

spring:
  application:
    name: SAA-11-Embed2Vector

  ai:
    dashscope:
      api-key: ${aliQwen_key}
      # 设置chat和embedding模型
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v4
    # redis stack
    vectorstore:
      redis:
        initialize-schema: true
        index-name: custom-index
        prefix: custom-prefix

  data:
    redis:
      host: localhost
      port: 6379



